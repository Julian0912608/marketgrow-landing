<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketGrow.ai — AI dat werkt voor dienstverleners. Binnen 7 dagen.</title>
  <meta name="description" content="MarketGrow voegt slimme AI-features toe aan jouw bestaande website. Geen migratie, geen tools die je zelf beheert. Modulair, schaalbaar, ontzorgd.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400;1,9..144,500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --mg-ink: #1A1D21;
      --mg-ink-soft: #2A2E33;
      --mg-cream: #F7F5F0;
      --mg-cream-dark: #EFEBE2;
      --mg-stone: #6B6F75;
      --mg-stone-light: #A8ABB0;
      --mg-lime: #D9F45A;
      --mg-lime-dark: #B8D43A;
      --mg-olive: #4A5840;
      --mg-line: #E5E1D7;
      --mg-line-dark: #353A41;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--mg-cream); color: var(--mg-ink); font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    .font-serif { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; font-variation-settings: "SOFT" 30; }
    .font-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; font-variation-settings: "opsz" 144, "SOFT" 50; }
    .font-mono { font-family: 'IBM Plex Mono', monospace; }
    .label-caps { font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.14em; font-size: 0.72rem; font-weight: 500; }
    .bg-ink { background: var(--mg-ink); }
    .bg-ink-soft { background: var(--mg-ink-soft); }
    .bg-cream { background: var(--mg-cream); }
    .bg-cream-dark { background: var(--mg-cream-dark); }
    .bg-lime { background: var(--mg-lime); }
    .bg-lime-dark { background: var(--mg-lime-dark); }
    .bg-olive { background: var(--mg-olive); }
    .text-ink { color: var(--mg-ink); }
    .text-cream { color: var(--mg-cream); }
    .text-stone { color: var(--mg-stone); }
    .text-stone-light { color: var(--mg-stone-light); }
    .text-lime { color: var(--mg-lime); }
    .text-olive { color: var(--mg-olive); }
    .border-line { border-color: var(--mg-line); }
    .border-line-dark { border-color: var(--mg-line-dark); }
    .grain::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
      opacity: 0.07; mix-blend-mode: multiply;
    }
    .grain { position: relative; }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fade-up 0.5s ease-out both; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }
    .typing-dot { animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--mg-line); }
    .marquee { display: flex; overflow: hidden; gap: 3rem; mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent); }
    .marquee-content { display: flex; gap: 3rem; animation: scroll 30s linear infinite; flex-shrink: 0; }
    @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
    .arrow-link { display: inline-flex; align-items: center; gap: 0.4rem; transition: gap 0.2s; }
    .arrow-link:hover { gap: 0.7rem; }
    a, button { outline: none; }
    button:focus-visible, a:focus-visible { box-shadow: 0 0 0 3px rgba(217, 244, 90, 0.4); }
    /* large display tightening */
    .display-tight { letter-spacing: -0.025em; line-height: 0.95; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // === ICON HELPER ===
    const Icon = ({ name, className = 'w-4 h-4' }) => {
      const icons = {
        'arrow-right': <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
        'arrow-up-right': <><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></>,
        'check': <polyline points="20 6 9 17 4 12"/>,
        'plus': <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        'minus': <line x1="5" y1="12" x2="19" y2="12"/>,
        'message-circle': <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>,
        'pen-tool': <><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></>,
        'send': <><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
        'file-text': <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>,
        'sparkles': <path d="M12 3l1.9 5.7L19 10l-5.1 1.3L12 17l-1.9-5.7L5 10l5.1-1.3z"/>,
        'star': <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
        'zap': <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
        'shield': <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
        'clock': <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
        'menu': <><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>,
        'x': <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
      };
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
          {icons[name] || <circle cx="12" cy="12" r="10"/>}
        </svg>
      );
    };

    // === LOGO ===
    const Logo = ({ light, size = 'text-xl' }) => (
      <div className="flex items-baseline gap-0.5">
        <span className={`font-serif ${size} font-medium tracking-tight ${light ? 'text-cream' : 'text-ink'}`}>MarketGrow</span>
        <span className={`font-serif ${size} ${light ? 'text-lime' : 'text-olive'} font-medium`}>.ai</span>
      </div>
    );

    // === NAV ===
    const Nav = () => {
      const [open, setOpen] = useState(false);
      return (
        <nav className="sticky top-0 z-40 bg-cream/85 backdrop-blur border-b border-line">
          <div className="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
            <Logo />
            <div className="hidden md:flex items-center gap-10 text-sm">
              <a href="#hoe" className="text-stone hover:text-ink transition-colors">Hoe het werkt</a>
              <a href="#bouwblokken" className="text-stone hover:text-ink transition-colors">Bouwblokken</a>
              <a href="#pricing" className="text-stone hover:text-ink transition-colors">Prijzen</a>
              <a href="#faq" className="text-stone hover:text-ink transition-colors">Veelgestelde vragen</a>
            </div>
            <a href="#intake" className="bg-ink text-cream px-5 py-2.5 text-sm flex items-center gap-2 hover:bg-ink-soft transition-colors">
              Plan intake <Icon name="arrow-right" className="w-3.5 h-3.5" />
            </a>
          </div>
        </nav>
      );
    };

    // === LIVE CHAT DEMO ===
    const ChatDemo = () => {
      const [messages, setMessages] = useState([
        { rol: 'ai', tekst: 'Hi 👋 Ik ben Marko, de AI-gids op MarketGrow. Wat doe je voor werk?' },
      ]);
      const [input, setInput] = useState('');
      const [typing, setTyping] = useState(false);
      const [stage, setStage] = useState(0);
      const [showCal, setShowCal] = useState(false);
      const scrollRef = useRef(null);

      useEffect(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [messages, typing]);

      const aiReply = (userText) => {
        const txt = userText.toLowerCase();
        if (stage === 0) {
          let response = '';
          if (/jurist|advocaat|recht/.test(txt)) {
            response = 'Goed dat je er bent. Veel juristen lopen tegen hetzelfde aan: de website krijgt bezoekers maar de kwaliteit van leads valt tegen. Herken je dat? En wat is op dit moment je grootste frustratie als je een nieuwe lead binnenkrijgt?';
          } else if (/accountant|boekhoud|fiscaal/.test(txt)) {
            response = 'Welkom. Voor accountants zien we vaak dat de website hoofdzakelijk dient als visitekaartje, terwijl er veel meer uit te halen valt qua kwalificatie van leads. Wat is voor jou op dit moment het grootste pijnpunt rond klantenwerving?';
          } else if (/hypotheek|financieel/.test(txt)) {
            response = 'Goed je te spreken. In hypotheekadvies zien we dat WhatsApp-bereik en snelle reactie het verschil maken tussen wel of geen klant. Hoe is dat bij jou geregeld nu?';
          } else if (/coach|mediation|fysio|therapeut/.test(txt)) {
            response = 'Welkom. In jouw vakgebied is het vaak een uitdaging om de juiste mensen aan te trekken, mensen die echt klikken met jouw aanpak. Hoe ervaar jij dat nu via je website?';
          } else if (/adviseur|consultant/.test(txt)) {
            response = 'Mooi. Veel adviseurs lopen tegen hetzelfde aan: de gesprekken die je voert zijn waardevol, maar je hebt te weinig tijd om constant te schrijven en te updaten. Klopt dat?';
          } else {
            response = 'Begrepen. MarketGrow werkt het beste voor dienstverleners die via intake-gesprekken hun klanten binnenhalen, denk aan juristen, accountants, hypotheekadviseurs, coaches en mediators. Past dat ongeveer bij wat jij doet? En zo ja: wat is op dit moment je grootste frustratie rond klantenwerving via je website?';
          }
          setTyping(true);
          setTimeout(() => {
            setTyping(false);
            setMessages(m => [...m, { rol: 'ai', tekst: response }]);
            setStage(1);
          }, 1400);
        } else if (stage === 1) {
          const response = 'Helder. Wat MarketGrow doet is precies dat oplossen: een AI-gespreksgids op je site die 24/7 bezoekers helpt en gekwalificeerde leads in je agenda zet, een content-engine die voor jou blogs schrijft in jouw stem, en WhatsApp-meldingen zodat je geen lead meer mist. Modulair, dus je kiest wat je nodig hebt. Wil je 20 min met Julian (founder) bespreken hoe dit er bij jou uit zou zien?';
          setTyping(true);
          setTimeout(() => {
            setTyping(false);
            setMessages(m => [...m, { rol: 'ai', tekst: response }]);
            setStage(2);
          }, 1600);
        } else {
          if (/ja|graag|prima|oke|ok|zeker|inderdaad/.test(txt)) {
            setTyping(true);
            setTimeout(() => {
              setTyping(false);
              setMessages(m => [...m, { rol: 'ai', tekst: 'Top. Hier kun je direct een intake van 20 min inplannen. Geen verkooppraatje, gewoon kijken of het past.' }]);
              setShowCal(true);
            }, 1200);
          } else {
            setTyping(true);
            setTimeout(() => {
              setTyping(false);
              setMessages(m => [...m, { rol: 'ai', tekst: 'Begrijp ik. Mocht je later toch willen sparren, dan kun je altijd terugkomen of een gratis intake plannen via de knop bovenin. Veel succes met je business.' }]);
            }, 1200);
          }
        }
      };

      const handleSend = () => {
        if (!input.trim()) return;
        const userText = input.trim();
        setMessages(m => [...m, { rol: 'user', tekst: userText }]);
        setInput('');
        setTimeout(() => aiReply(userText), 350);
      };

      return (
        <div className="bg-cream border border-line shadow-[0_30px_60px_-25px_rgba(26,29,33,0.15)] flex flex-col h-[540px] max-w-md w-full">
          <div className="px-5 py-3.5 border-b border-line bg-cream-dark flex items-center justify-between">
            <div className="flex items-center gap-2.5">
              <div className="w-7 h-7 bg-olive text-cream flex items-center justify-center text-xs font-medium">M</div>
              <div>
                <div className="text-sm font-medium">Marko</div>
                <div className="text-xs text-stone flex items-center gap-1.5">
                  <span className="w-1.5 h-1.5 rounded-full bg-olive"></span> AI-gids · online
                </div>
              </div>
            </div>
            <div className="label-caps text-stone text-[10px]">Live demo</div>
          </div>

          <div ref={scrollRef} className="flex-1 overflow-y-auto p-5 space-y-3 scrollbar-thin">
            {messages.map((msg, i) => (
              <div key={i} className={`flex gap-2.5 ${msg.rol === 'user' ? 'flex-row-reverse' : ''} fade-up`}>
                {msg.rol === 'ai' && <div className="w-6 h-6 bg-olive text-cream flex items-center justify-center text-[10px] flex-shrink-0 mt-0.5">M</div>}
                <div className={`max-w-[85%] px-3.5 py-2.5 text-sm leading-relaxed ${msg.rol === 'ai' ? 'bg-cream-dark text-ink' : 'bg-ink text-cream'}`}>
                  {msg.tekst}
                </div>
              </div>
            ))}
            {typing && (
              <div className="flex gap-2.5 fade-up">
                <div className="w-6 h-6 bg-olive text-cream flex items-center justify-center text-[10px] flex-shrink-0 mt-0.5">M</div>
                <div className="bg-cream-dark px-4 py-3 flex gap-1">
                  <span className="typing-dot w-1.5 h-1.5 bg-stone rounded-full"></span>
                  <span className="typing-dot w-1.5 h-1.5 bg-stone rounded-full"></span>
                  <span className="typing-dot w-1.5 h-1.5 bg-stone rounded-full"></span>
                </div>
              </div>
            )}
            {showCal && (
              <div className="fade-up bg-ink text-cream p-4 ml-8">
                <div className="label-caps text-lime mb-2">Intake inplannen</div>
                <div className="text-sm mb-3">20 minuten · gratis · met Julian</div>
                <div className="grid grid-cols-3 gap-1.5 mb-3">
                  {['Ma 26 mei · 14:00', 'Di 27 mei · 10:00', 'Wo 28 mei · 15:30'].map(slot => (
                    <button key={slot} className="bg-ink-soft text-cream text-xs py-2 hover:bg-lime hover:text-ink transition-colors">{slot}</button>
                  ))}
                </div>
                <div className="text-xs text-stone-light">Of <a href="#" className="text-lime underline">bekijk alle slots</a></div>
              </div>
            )}
          </div>

          <div className="border-t border-line p-3 flex gap-2 bg-cream">
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSend()}
              placeholder="Typ je antwoord..."
              className="flex-1 bg-cream-dark border border-line px-3 py-2 text-sm focus:outline-none focus:border-ink" />
            <button onClick={handleSend} className="bg-ink text-cream px-4 hover:bg-ink-soft">
              <Icon name="send" className="w-4 h-4" />
            </button>
          </div>
        </div>
      );
    };

    // === HERO ===
    const Hero = () => (
      <section className="relative grain overflow-hidden">
        <div className="max-w-7xl mx-auto px-8 pt-20 pb-24 grid lg:grid-cols-12 gap-12 items-center">
          <div className="lg:col-span-7 fade-up">
            <div className="label-caps text-stone mb-6">AI voor dienstverleners · sinds 2026</div>
            <h1 className="font-display text-[clamp(3rem,7vw,6rem)] font-medium display-tight mb-8">
              AI dat <em className="italic text-olive">werkt</em><br/>
              voor dienst&shy;verleners.<br/>
              <span className="text-stone">Binnen 7 dagen.</span>
            </h1>
            <p className="text-lg leading-relaxed max-w-xl mb-10 text-ink/85">
              MarketGrow voegt slimme AI-features toe aan jouw bestaande website.
              Geen migratie, geen tools die je zelf moet beheren. Modulair, schaalbaar,
              en wij blijven het onderhouden.
            </p>
            <div className="flex flex-wrap items-center gap-4 mb-10">
              <a href="#intake" className="bg-ink text-cream px-7 py-4 text-sm font-medium flex items-center gap-2.5 hover:bg-ink-soft transition-colors">
                Plan een vrijblijvende intake <Icon name="arrow-right" className="w-4 h-4" />
              </a>
              <a href="#hoe" className="text-sm font-medium arrow-link border-b border-ink pb-1">
                Hoe het werkt <Icon name="arrow-right" className="w-3.5 h-3.5" />
              </a>
            </div>
            <div className="flex items-center gap-8 text-sm text-stone">
              <div className="flex items-center gap-2">
                <Icon name="check" className="w-4 h-4 text-olive" />
                <span>Vanaf €1.950 setup</span>
              </div>
              <div className="flex items-center gap-2">
                <Icon name="check" className="w-4 h-4 text-olive" />
                <span>Live in 7 werkdagen</span>
              </div>
              <div className="flex items-center gap-2">
                <Icon name="check" className="w-4 h-4 text-olive" />
                <span>Eerste maand niet goed, geld terug</span>
              </div>
            </div>
          </div>
          <div className="lg:col-span-5 fade-up flex justify-center lg:justify-end" style={{animationDelay: '0.15s'}}>
            <ChatDemo />
          </div>
        </div>
      </section>
    );

    // === MARQUEE ===
    const Marquee = () => {
      const sectoren = ['Juristen & advocaten', 'Mediators', 'Accountants', 'Hypotheekadviseurs', 'Fysiotherapeuten', 'Bedrijfsadviseurs', 'Coaches', 'Financieel planners', 'Architecten'];
      return (
        <div className="border-y border-line py-6 bg-cream-dark">
          <div className="max-w-7xl mx-auto px-8 mb-4">
            <div className="label-caps text-stone">Gebouwd voor service-mkb</div>
          </div>
          <div className="marquee">
            <div className="marquee-content font-serif text-3xl text-stone">
              {sectoren.map((s, i) => <span key={i} className="whitespace-nowrap"><em>{s}</em><span className="text-lime-dark ml-12">✦</span></span>)}
            </div>
            <div className="marquee-content font-serif text-3xl text-stone">
              {sectoren.map((s, i) => <span key={i} className="whitespace-nowrap"><em>{s}</em><span className="text-lime-dark ml-12">✦</span></span>)}
            </div>
          </div>
        </div>
      );
    };

    // === PROBLEEM ===
    const Probleem = () => (
      <section className="py-32">
        <div className="max-w-7xl mx-auto px-8">
          <div className="grid lg:grid-cols-12 gap-12 mb-20">
            <div className="lg:col-span-5">
              <div className="label-caps text-stone mb-4">Het probleem</div>
              <h2 className="font-display text-5xl lg:text-6xl font-medium display-tight">
                Drie dingen die <em className="italic text-olive">elke</em> dienstverlener herkent.
              </h2>
            </div>
            <div className="lg:col-span-6 lg:col-start-7 flex items-end">
              <p className="text-lg text-stone leading-relaxed">
                Je hebt al een website. Je hebt al klanten. Maar er gaat te veel verloren tussen "iemand bezoekt mijn site" en "ik heb een waardevolle nieuwe klant".
              </p>
            </div>
          </div>

          <div className="grid lg:grid-cols-3 gap-px bg-line border border-line">
            {[
              {
                nr: '01',
                titel: 'Te veel bezoekers gaan weg zonder dat je het merkt',
                tekst: 'Je website krijgt verkeer, maar de meeste mensen klikken weg zonder contact op te nemen. Hun vraag was niet helder genoeg. Of het was buiten kantoortijd. Of jij was er even niet.',
              },
              {
                nr: '02',
                titel: 'Je AI-ambities lopen vast op uitvoering',
                tekst: 'Je leest dat anderen "iets met AI doen". Je voelt achterstand. Maar de stap van "ik wil AI" naar "ik heb het draaien" is voor een dienstverlener zonder tech-team bijna onneembaar.',
              },
              {
                nr: '03',
                titel: 'Een marketingbureau is te duur, losse tools te veel werk',
                tekst: '€5K per maand voor een bureau is geen optie. ChatGPT zelf installeren, knowledge bases beheren, integraties bouwen, dat is ander werk dan waar je voor opgeleid bent.',
              },
            ].map(p => (
              <div key={p.nr} className="bg-cream p-10">
