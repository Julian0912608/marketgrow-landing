<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketGrow.ai · AI dat werkt voor dienstverleners. Binnen 7 dagen.</title>
  <meta name="description" content="MarketGrow plaatst Marko, een AI-gespreksgids, op je bestaande site. Hij kwalificeert bezoekers 24/7 en zet alleen de juiste mensen in je agenda. Live in 7 werkdagen.">
  <meta name="theme-color" content="#FBF9F4">
  <meta property="og:title" content="MarketGrow.ai · in gesprek met Marko">
  <meta property="og:description" content="Geen tour of pitch. Een gesprek. Vertel wat je doet, en Marko laat zien wat MarketGrow voor je dienstverlening kan doen.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="nl_NL">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#FBF9F4',
            paper2: '#F2EEE3',
            ink: '#1A1B1A',
            ink2: '#2C2E2B',
            mute: '#6F6E68',
            soft: '#A09E94',
            line: '#E6E1D2',
            lime: '#C8FF4D',
            olive: '#3F4A2E',
            sage: '#6B7B49',
          },
        },
      },
    };
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --paper: #FBF9F4;
      --paper2: #F2EEE3;
      --ink: #1A1B1A;
      --mute: #6F6E68;
      --line: #E6E1D2;
      --lime: #C8FF4D;
      --olive: #3F4A2E;
      --halo: #DCEE96;
    }
    html, body { background: var(--paper); color: var(--ink); margin: 0; padding: 0; }
    body {
      font-family: 'Inter Tight', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "ss01", "cv11";
    }
    .serif { font-family: 'Instrument Serif', Georgia, serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .tag {
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 11px;
      font-weight: 500;
    }
    .display {
      font-family: 'Instrument Serif', Georgia, serif;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.0;
    }
    .stage { position: relative; min-height: 100vh; background: var(--paper); }
    .stage::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 70% 100%, rgba(220,238,150,0.35), transparent 70%),
        radial-gradient(ellipse 50% 30% at 10% 0%, rgba(220,238,150,0.18), transparent 70%);
    }
    .stage::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
      opacity: 0.035; mix-blend-mode: multiply;
    }
    .topbar {
      position: sticky; top: 0; z-index: 30;
      background: rgba(251,249,244,0.82); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .mark {
      width: 36px; height: 36px; flex-shrink: 0;
      background: var(--olive); color: var(--paper);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1;
      border-radius: 50%;
    }
    .mark-lg { width: 56px; height: 56px; font-size: 32px; }
    .bubble {
      background: #fff; border: 1px solid var(--line);
      border-radius: 22px 22px 22px 6px;
      padding: 18px 22px;
      box-shadow: 0 14px 32px -22px rgba(26,27,26,0.18);
      max-width: 100%;
    }
    .bubble-tight { border-radius: 22px; padding: 16px 22px; }
    .bubble-user {
      background: var(--ink); color: var(--paper);
      border-radius: 22px 22px 6px 22px;
      padding: 14px 20px; max-width: 80%;
      align-self: flex-end;
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      display: inline-flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid var(--line); color: var(--ink);
      padding: 10px 16px; border-radius: 999px;
      font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      box-shadow: 0 4px 10px -6px rgba(26,27,26,0.1);
      text-decoration: none;
    }
    .chip:hover { border-color: var(--ink); transform: translateY(-1px); }
    .chip-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .chip-primary:hover { background: #000; }
    .chip-lime { background: var(--lime); border-color: var(--lime); color: var(--ink); }
    .chip-lime:hover { filter: brightness(0.97); }
    .chip-arrow { transition: transform 0.2s; }
    .chip:hover .chip-arrow { transform: translateX(3px); }
    .card {
      background: #fff; border: 1px solid var(--line);
      box-shadow: 0 18px 40px -28px rgba(26,27,26,0.2);
    }
    .card-grid { display: grid; gap: 1px; background: var(--line); border: 1px solid var(--line); }
    .card-grid > * { background: #fff; }
    .card-ink {
      background: var(--ink); color: var(--paper);
      border: 1px solid var(--ink);
      position: relative; overflow: hidden;
    }
    .card-ink::before {
      content: ''; position: absolute; top: -20px; right: -20px;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(200,255,77,0.4), transparent 65%);
      filter: blur(20px); pointer-events: none;
    }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-3px); opacity: 1; }
    }
    .typing-dot { animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fade-up 0.4s ease-out both; }
    @keyframes blink { 50% { opacity: 0; } }
    .blink { animation: blink 1s steps(2) infinite; }
    .rail { display: flex; gap: 6px; align-items: center; }
    .rail-dot {
      width: 22px; height: 4px; border-radius: 2px; background: var(--line);
      transition: background 0.2s;
    }
    .rail-dot.done { background: var(--olive); }
    .rail-dot.now { background: var(--ink); }
    .sticky-cta {
      position: sticky; bottom: 0; z-index: 20;
      background: linear-gradient(to top, var(--paper) 60%, rgba(251,249,244,0));
      padding: 22px 0 26px;
    }
    .pulse-ring-w { position: relative; }
    .pulse-ring-w::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: var(--lime); opacity: 0.5;
      animation: pulse-ring 2s ease-out infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    a, button { outline: none; }
    button:focus-visible, a:focus-visible { box-shadow: 0 0 0 3px rgba(200,255,77,0.5); }
    .group:hover .hover-arrow { transform: translateX(4px); }
    .hover-arrow { transition: transform 0.2s; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="v3/cards.jsx"></script>
  <script type="text/babel" src="v3/app.jsx"></script>
</body>
</html>
